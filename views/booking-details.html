<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details - Bus Booking System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .passenger-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        
        .passenger-table th,
        .passenger-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .passenger-table th {
            background-color: #f5f5f5;
            font-weight: 600;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-confirmed {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-cancelled {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">BusBooking System</a>
        </div>
        <ul class="nav-menu">
            <!-- Will be populated by JavaScript -->
        </ul>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Booking Details</h2>
            <a href="/my-bookings" class="btn">← Back to My Bookings</a>
        </div>
        
        <div id="bookingDetails" class="booking-summary">
            <!-- Booking details will be loaded here -->
            <div class="spinner"></div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Bus Booking System. All rights reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId');
        
        if (!bookingId) {
            window.location.href = '/my-bookings';
        }

        async function loadBookingDetails() {
            try {
                const booking = await API.get(`/bookings/${bookingId}`);
                
                const statusClass = booking.status === 'Confirmed' ? 'status-confirmed' :
                                   booking.status === 'Cancelled' ? 'status-cancelled' : 'status-pending';
                
                let passengersHtml = '<h3>Passenger Details</h3>';
                passengersHtml += '<table class="passenger-table">';
                passengersHtml += '<thead><tr><th>Seat No.</th><th>Name</th><th>Age</th><th>Gender</th></tr></thead>';
                passengersHtml += '<tbody>';
                
                booking.passengers.forEach(passenger => {
                    passengersHtml += `
                        <tr>
                            <td>${passenger.seatNumber}</td>
                            <td>${passenger.name}</td>
                            <td>${passenger.age}</td>
                            <td>${passenger.gender}</td>
                        </tr>
                    `;
                });
                
                passengersHtml += '</tbody></table>';
                
                const detailsHtml = `
                    <div style="margin-bottom: 2rem;">
                        <span class="status-badge ${statusClass}">${booking.status}</span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Booking ID:</span>
                        <span class="detail-value">${booking.bookingId}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Booking Date:</span>
                        <span class="detail-value">${new Date(booking.bookingDate).toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Journey Date:</span>
                        <span class="detail-value">${new Date(booking.journeyDate).toLocaleDateString()}</span>
                    </div>
                    
                    <h3 style="margin-top: 2rem;">Bus Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Bus Name:</span>
                        <span class="detail-value">${booking.schedule.bus.busName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Bus Number:</span>
                        <span class="detail-value">${booking.schedule.bus.busNumber}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Bus Type:</span>
                        <span class="detail-value">${booking.schedule.bus.busType}</span>
                    </div>
                    
                    <h3 style="margin-top: 2rem;">Journey Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Route:</span>
                        <span class="detail-value">${booking.schedule.route.source} → ${booking.schedule.route.destination}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Departure:</span>
                        <span class="detail-value">${formatTime(booking.schedule.departureTime)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Arrival:</span>
                        <span class="detail-value">${formatTime(booking.schedule.arrivalTime)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duration:</span>
                        <span class="detail-value">${booking.schedule.route.duration} minutes</span>
                    </div>
                    
                    ${passengersHtml}
                    
                    <h3 style="margin-top: 2rem;">Payment Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Total Fare:</span>
                        <span class="detail-value">${formatCurrency(booking.totalFare)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Status:</span>
                        <span class="detail-value" style="color: ${booking.paymentStatus === 'Completed' ? '#27ae60' : '#e74c3c'};">${booking.paymentStatus}</span>
                    </div>
                    
                    ${booking.status !== 'Cancelled' && new Date(booking.journeyDate) > new Date() ? 
                        `<div style="text-align: center; margin-top: 2rem;">
                            <button class="btn btn-danger" onclick="cancelBooking('${booking.bookingId}')">Cancel Booking</button>
                        </div>` : 
                        ''}
                `;
                
                document.getElementById('bookingDetails').innerHTML = detailsHtml;
                
            } catch (error) {
                document.getElementById('bookingDetails').innerHTML = `<p class="alert alert-error">Error loading booking details: ${error.message}</p>`;
            }
        }

        async function cancelBooking(bookingId) {
            if (!confirm('Are you sure you want to cancel this booking?')) {
                return;
            }
            
            try {
                await API.put(`/bookings/${bookingId}/cancel`);
                showAlert('Booking cancelled successfully', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } catch (error) {
                showAlert('Error cancelling booking: ' + error.message, 'error');
            }
        }

        // Load booking details on page load
        loadBookingDetails();
    </script>
</body>
</html>
