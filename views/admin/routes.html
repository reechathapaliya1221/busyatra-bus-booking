<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Routes - Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">BusBooking System</a>
        </div>
        <ul class="nav-menu">
            <!-- Will be populated by JavaScript -->
        </ul>
    </nav>

    <div class="container">
        <div class="admin-dashboard">
            <div class="sidebar">
                <h3>Admin Panel</h3>
                <ul class="sidebar-menu">
                    <li><a href="/admin/dashboard">Dashboard</a></li>
                    <li><a href="/admin/buses">Manage Buses</a></li>
                    <li><a href="/admin/routes" class="active">Manage Routes</a></li>
                    <li><a href="/admin/schedules">Manage Schedules</a></li>
                    <li><a href="/admin/bookings">All Bookings</a></li>
                </ul>
            </div>
            
            <div class="content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Manage Routes</h2>
                    <button class="btn btn-primary" onclick="showAddRouteModal()">Add New Route</button>
                </div>
                
                <div id="routesList">
                    <!-- Routes list will be loaded here -->
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Route Modal -->
    <div id="routeModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add New Route</h2>
            <form id="routeForm">
                <input type="hidden" id="routeId">
                
                <div class="form-group">
                    <label for="source">Source City</label>
                    <input type="text" id="source" required>
                </div>
                
                <div class="form-group">
                    <label for="destination">Destination City</label>
                    <input type="text" id="destination" required>
                </div>
                
                <div class="form-group">
                    <label for="distance">Distance (km)</label>
                    <input type="number" id="distance" min="1" required>
                </div>
                
                <div class="form-group">
                    <label for="duration">Duration (minutes)</label>
                    <input type="number" id="duration" min="1" required>
                </div>
                
                <div class="form-group">
                    <label for="baseFare">Base Fare ($)</label>
                    <input type="number" id="baseFare" min="1" step="0.01" required>
                </div>
                
                <div style="text-align: right;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Route</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Bus Booking System. All rights reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        async function loadRoutes() {
            try {
                const routes = await API.get('/admin/routes');
                
                if (routes.length === 0) {
                    document.getElementById('routesList').innerHTML = '<p class="alert alert-info">No routes found. Click "Add New Route" to create one.</p>';
                    return;
                }
                
                let html = '<table class="data-table"><thead><tr><th>Source</th><th>Destination</th><th>Distance</th><th>Duration</th><th>Base Fare</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                
                routes.forEach(route => {
                    html += `
                        <tr>
                            <td>${route.source}</td>
                            <td>${route.destination}</td>
                            <td>${route.distance} km</td>
                            <td>${route.duration} mins</td>
                            <td>${formatCurrency(route.baseFare)}</td>
                            <td><span style="color: ${route.isActive ? '#27ae60' : '#e74c3c'};">${route.isActive ? 'Active' : 'Inactive'}</span></td>
                            <td class="actions">
                                <button class="btn btn-small" onclick="editRoute('${route._id}')">Edit</button>
                                <button class="btn btn-small btn-danger" onclick="deleteRoute('${route._id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
                document.getElementById('routesList').innerHTML = html;
                
            } catch (error) {
                document.getElementById('routesList').innerHTML = `<p class="alert alert-error">Error loading routes: ${error.message}</p>`;
            }
        }

        function showAddRouteModal() {
            document.getElementById('modalTitle').textContent = 'Add New Route';
            document.getElementById('routeForm').reset();
            document.getElementById('routeId').value = '';
            document.getElementById('routeModal').style.display = 'block';
        }

        async function editRoute(id) {
            try {
                const routes = await API.get('/admin/routes');
                const route = routes.find(r => r._id === id);
                
                if (route) {
                    document.getElementById('modalTitle').textContent = 'Edit Route';
                    document.getElementById('routeId').value = route._id;
                    document.getElementById('source').value = route.source;
                    document.getElementById('destination').value = route.destination;
                    document.getElementById('distance').value = route.distance;
                    document.getElementById('duration').value = route.duration;
                    document.getElementById('baseFare').value = route.baseFare;
                    
                    document.getElementById('routeModal').style.display = 'block';
                }
            } catch (error) {
                showAlert('Error loading route details: ' + error.message, 'error');
            }
        }

        async function deleteRoute(id) {
            if (!confirm('Are you sure you want to delete this route?')) {
                return;
            }
            
            try {
                await API.delete(`/admin/routes/${id}`);
                showAlert('Route deleted successfully', 'success');
                loadRoutes();
            } catch (error) {
                showAlert('Error deleting route: ' + error.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('routeModal').style.display = 'none';
        }

        // Handle form submission
        document.getElementById('routeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const routeData = {
                source: document.getElementById('source').value,
                destination: document.getElementById('destination').value,
                distance: parseInt(document.getElementById('distance').value),
                duration: parseInt(document.getElementById('duration').value),
                baseFare: parseFloat(document.getElementById('baseFare').value)
            };
            
            const routeId = document.getElementById('routeId').value;
            
            try {
                if (routeId) {
                    await API.put(`/admin/routes/${routeId}`, routeData);
                    showAlert('Route updated successfully', 'success');
                } else {
                    await API.post('/admin/routes', routeData);
                    showAlert('Route created successfully', 'success');
                }
                
                closeModal();
                loadRoutes();
            } catch (error) {
                showAlert('Error saving route: ' + error.message, 'error');
            }
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('routeModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Load routes on page load
        loadRoutes();
    </script>
</body>
</html>
